<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mock-KI Interview mit Zeitlimit</title>
</head>
<body>

<h2>Mock-KI Bewerbungsgespräch (Deutsch)</h2>
<button id="startBtn">Interview starten</button>
<p id="question"></p>

<script>
// Vorprogrammierte Fragen + Zeit pro Frage (ms)
const interviewQuestions = [
  "Guten Tag, wie heißen Sie denn?",
  "Schön Sie kennenzulernen. Stellen Sie sich bitte in einem Satz einmalkurz vor.",
  "Warum sollten wir sie einstellen? ",
  "Vielen Dank, das Interview ist beendet."
];

const answerTimes = [5000, 5000, 5000, 5000, 3000]; // Zeit pro Frage in ms

let current = 0;
let recognition;
let interviewTimeout;

// Text-to-Speech Funktion
function speak(text){
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "de-DE";
  speechSynthesis.speak(utter);
}

// Nächste Frage
function nextQuestion(){
  if(current < interviewQuestions.length){
    const q = interviewQuestions[current];
    document.getElementById("question").innerText = q;
    speak(q);

    // Mikrofon starten
    recognition.start();

    // Antwortzeit abwarten, Mikrofon stoppen, zur nächsten Frage
    setTimeout(() => {
      recognition.stop(); 
      current++;
    }, answerTimes[current]);

  } else {
    document.getElementById("question").innerText = "Das Interview beendet. Vielen Dank!";
    speak("Das Interview beendet. Vielen Dank!");
  }
}

// Start Button
document.getElementById("startBtn").addEventListener("click", () => {
  if (!('webkitSpeechRecognition' in window)) {
    alert("Bitte Chrome oder Edge benutzen!");
    return;
  }

  recognition = new webkitSpeechRecognition();
  recognition.lang = "de-DE";

  recognition.onresult = (event) => {
    const answer = event.results[0][0].transcript;
    console.log("Antwort:", answer); // hier könntest du sie speichern
  };

  recognition.onerror = (err) => console.log("Mikrofonfehler:", err);

  current = 0;
  nextQuestion();

  // 5-Minuten Gesamt-Timeout
  interviewTimeout = setTimeout(() => {
    recognition.stop();
    document.getElementById("question").innerText = "Interview beendet. Vielen Dank!";
  }, 300000); // 300.000 ms = 5 Minuten
});
</script>

</body>
</html>
